# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8081
spring.application.name=iam-pam-backend

# ============================================================================
# KEYCLOAK OAUTH2 CONFIGURATION (Resource Server)
# ============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/iam-pam-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/iam-pam-realm/protocol/openid-connect/certs

# ============================================================================
# KEYCLOAK ADMIN CLIENT (pour gestion utilisateurs et groupes)
# ============================================================================
keycloak.server-url=http://localhost:8080
keycloak.realm=iam-pam-realm
keycloak.admin.client-id=admin-cli
keycloak.admin.client-secret=your-client-secret-here

# ============================================================================
# POSTGRESQL CONFIGURATION
# ============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/iam_pam_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=shared

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.iam.pam=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ============================================================================
# ACTUATOR
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================================
# CORS
# ============================================================================
cors.allowed-origins=http://localhost:3000

# ============================================================================
# DEVELOPMENT
# ============================================================================
spring.devtools.restart.enabled=true
spring.web.resources.cache.period=0

# ============================================================================
# SWAGGER CONFIGURATION
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Scheduling (expiration automatique des acces)
spring.task.scheduling.enabled=true
