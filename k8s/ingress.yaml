apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iam-pam-ingress
  namespace: iam-pam
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support for /ws/ (Guacamole RDP, SSH terminal)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: ""   # match any host — access via http://192.168.112.139
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: iam-pam-backend
                port:
                  number: 8081
          # WebSocket endpoints (terminal, RDP, web proxy)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: iam-pam-backend
                port:
                  number: 8081
          # Web proxy sessions
          - path: /proxy
            pathType: Prefix
            backend:
              service:
                name: iam-pam-backend
                port:
                  number: 8081
          # Keycloak auth server
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # Keycloak admin console
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # Angular SPA — must be last
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iam-pam-frontend
                port:
                  number: 80
