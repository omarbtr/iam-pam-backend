# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8081
spring.application.name=iam-pam-backend
spring.profiles.active=local

# ============================================================================
# KEYCLOAK OAUTH2 CONFIGURATION (Resource Server)
# ============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_SERVER_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:iam-pam-realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_SERVER_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:iam-pam-realm}/protocol/openid-connect/certs

# ============================================================================
# KEYCLOAK ADMIN CLIENT (pour gestion utilisateurs et groupes)
# ============================================================================
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
keycloak.realm=${KEYCLOAK_REALM:iam-pam-realm}
keycloak.admin.client-id=${KEYCLOAK_CLIENT_ID:iam-pam-backend}
keycloak.admin.client-secret=${KEYCLOAK_CLIENT_SECRET:changeme}

# ============================================================================
# POSTGRESQL CONFIGURATION
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/iam_pam_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=shared

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.iam.pam=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ============================================================================
# ACTUATOR
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
# Disable SMTP connectivity probe — mail sender is optional (falls back to log when not configured)
management.health.mail.enabled=false

# ============================================================================
# CORS
# ============================================================================
cors.allowed-origins=http://localhost:3000

# ============================================================================
# DEVELOPMENT
# ============================================================================
spring.devtools.restart.enabled=true
spring.web.resources.cache.period=0

# ============================================================================
# SWAGGER CONFIGURATION
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Scheduling (expiration automatique des acces)
spring.task.scheduling.enabled=true

# ============================================================================
# BASTION SSH
# ============================================================================
bastion.host=${BASTION_HOST:192.168.112.138}
bastion.port=${BASTION_PORT:22}
bastion.user=${BASTION_USER:bastion-agent}
bastion.private-key-path=${BASTION_KEY_PATH:classpath:bastion_key}

# ============================================================================
# GUACD (Apache Guacamole daemon — RDP/VNC proxy)
# ============================================================================
guacd.host=${GUACD_HOST:192.168.112.138}
guacd.port=${GUACD_PORT:4822}

# Guacamole display frames can be several MB
server.tomcat.max-swallow-size=-1

# ============================================================================
# RESOURCE CREDENTIAL ENCRYPTION (AES-256-GCM)
# ============================================================================
resource.encryption.key=${RESOURCE_ENCRYPTION_KEY:default-key-change-in-prod-32chars!}

# ============================================================================
# FACE AUTH JWT
# ============================================================================
face.jwt.secret=${FACE_JWT_SECRET:face-auth-secret-key-32-chars-minimum!!}
face.jwt.expiry-hours=24

# ============================================================================
# EMAIL OTP (spring-boot-starter-mail / JavaMailSender)
# Set SMTP_USERNAME + SMTP_PASSWORD env vars; leave blank to fall back to log-only
# ============================================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
mfa.email.from=${MFA_EMAIL_FROM:noreply@iam-pam.local}
mfa.email.enabled=${MFA_EMAIL_ENABLED:false}

# ============================================================================
# SMS + WHATSAPP OTP (Twilio REST API)
# Set TWILIO_ACCOUNT_SID + TWILIO_AUTH_TOKEN env vars to activate real sending
# ============================================================================
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.sms.from=${TWILIO_SMS_FROM:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
twilio.sms.enabled=${TWILIO_SMS_ENABLED:true}
twilio.whatsapp.enabled=${TWILIO_WHATSAPP_ENABLED:true}
