name: CD — Deploy to K3s
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy to K3s VM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Apply K8s manifests
        run: |
          export KUBECONFIG=~/.kube/config
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/postgresql/
          kubectl create configmap keycloak-realm \
            --from-file=realm-import.json=k8s/keycloak/realm-import.json \
            -n iam-pam --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/keycloak/configmap.yaml
          kubectl apply -f k8s/keycloak/secret.yaml
          kubectl apply -f k8s/keycloak/deployment.yaml
          kubectl apply -f k8s/keycloak/service.yaml
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/openldap/
          kubectl apply -f k8s/phpldapadmin/
          kubectl apply -f k8s/pgadmin/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/bastion/

      - name: Wait for rollout
        run: |
          export KUBECONFIG=~/.kube/config
          kubectl rollout status deployment/backend -n iam-pam --timeout=180s
          kubectl rollout status deployment/frontend -n iam-pam --timeout=180s